services:
  backend:
    build:
      context: ../backend
    command: python -m app.ops.start_api
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://autolearning:autolearning@postgres:5432/autolearning
      REDIS_URL: redis://redis:6379/0
      REPOSITORY_BACKEND: postgres
      RAG_BACKEND: memory
      CHROMA_PERSIST_DIR: /app/data/chroma
      MODEL_PROVIDER: openai_compatible
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      EMBEDDING_PROVIDER: openai_compatible
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_ALLOW_FALLBACK: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  celery-worker:
    build:
      context: ../backend
    command: python -m app.ops.start_worker
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://autolearning:autolearning@postgres:5432/autolearning
      REDIS_URL: redis://redis:6379/0
      REPOSITORY_BACKEND: postgres
      RAG_BACKEND: memory
      CHROMA_PERSIST_DIR: /app/data/chroma
      MODEL_PROVIDER: openai_compatible
      LLM_API_BASE: ${LLM_API_BASE:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.4}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      EMBEDDING_PROVIDER: openai_compatible
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_ALLOW_FALLBACK: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - chroma_data:/app/data/chroma

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: autolearning
      POSTGRES_USER: autolearning
      POSTGRES_PASSWORD: autolearning
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autolearning -d autolearning"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: autolearning
      MINIO_ROOT_PASSWORD: autolearning123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  chroma_data:
